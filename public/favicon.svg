<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg { fill: #f4efe3; }
    .ring { stroke: #221c15; opacity: 0.4; }
    .mark { fill: #8d3a29; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #15110d; }
      .ring { stroke: #ece3d2; opacity: 0.5; }
      .mark { fill: #cd8156; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14" />
  <circle class="ring" cx="32" cy="32" r="25" fill="none" stroke-width="2" />
  <circle class="ring" cx="32" cy="32" r="21" fill="none" stroke-width="1" />
  <text
    class="mark"
    x="32"
    y="33"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-weight="600"
    font-size="32"
    letter-spacing="-2"
  >NU</text>
</svg>
