    <script>
      // Set the theme before first paint so there is no flash.
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var system = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          document.documentElement.setAttribute(
            "data-theme",
            saved || system
          );
        } catch (e) {}
      })();
    </script>
